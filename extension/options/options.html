<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>VideoGrab — Настройки</title>
  <script src="../lib/auth-form.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0f;
      color: #f0f0f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      padding: 40px 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: #6366f1; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; fill: white; }
    .logo-text { font-size: 24px; font-weight: 700; }
    .logo-text span { color: #6366f1; }
    
    .section {
      background: #18181b;
      border: 1px solid #2e2e35;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b6b78;
      margin-bottom: 16px;
    }
    
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .status.visible { display: block; }
    .status.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .status.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
    .status.info { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; }
    
    .hint {
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      color: #a1a1aa;
    }
    .hint strong { color: #f0f0f2; }
    .hint code {
      background: #222226;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="logo-text">Video<span>Grab</span></div>
    </div>

    <!-- Auth Component -->
    <div id="authSection" class="section">
      <auth-form api-url="http://193.242.109.48:8301"></auth-form>
    </div>

    <!-- Profile Section -->
    <div id="profileSection" class="section hidden">
      <h3>Профиль</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <div style="width:48px;height:48px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;" id="avatarLetter">A</div>
        <div>
          <div style="font-weight:600;" id="profileEmail">user@example.com</div>
          <div style="font-size:12px;color:#6b6b78;">
            План: <span id="profilePlan" class="user-plan">Free</span>
          </div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#6b6b78;margin-bottom:6px;">
          <span>Использовано сегодня</span>
          <span id="usageText">0 / 3</span>
        </div>
        <div style="height:6px;background:#222226;border-radius:3px;overflow:hidden;">
          <div id="usageFill" class="usage-fill" style="width:0%;height:100%;background:#22c55e;transition:width .3s;"></div>
        </div>
      </div>
      <button class="btn" id="btnLogout" style="background:#2e2e35;width:100%;padding:12px;border:none;border-radius:8px;color:white;font-size:14px;font-weight:600;cursor:pointer;">Выйти</button>
    </div>

    <!-- Hint -->
    <div class="hint">
      <strong>Как настроить:</strong><br>
      1. Бэкенд уже настроен<br>
      2. Зарегистрируйся или войди в аккаунт<br>
      3. Подтверди email (придёт письмо)<br>
      4. Открывай страницы с видео и скачивай!
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
