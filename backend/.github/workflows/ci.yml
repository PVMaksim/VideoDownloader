name: CI
on: [push, pull_request]
jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Start stack
        run: docker compose up -d db redis api worker
      - name: Wait for API
        run: |
          pip install httpx
          python -c "
          import httpx, time
          for _ in range(40):
              try:
                  if httpx.get('http://localhost:8010/api/health').status_code == 200: break
              except: pass
              time.sleep(3)
          "
      - name: Run tests
        run: pytest tests/ -v
      - name: Cleanup
        if: always()
        run: docker compose down -v
