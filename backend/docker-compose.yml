services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 256m
    mem_reservation: 128m
    ports: ["8301:8000"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SKIP_AUTH=${SKIP_AUTH:-false}
      - REDIS_URL=redis://redis:6379/0
      - SKIP_EMAIL_VERIFICATION=${SKIP_EMAIL_VERIFICATION:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ALGORITHM=${ALGORITHM:-HS256}
      - APP_URL=${APP_URL:-http://193.242.109.48:8301}
    volumes:
      - ./src:/app/src
      - ./downloads:/app/downloads
      - downloads:/tmp/videodownloader
    depends_on: [db, redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    mem_limit: 512m
    mem_reservation: 256m
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./src:/app/src
      - ./downloads:/app/downloads
      - downloads:/tmp/videodownloader
    depends_on: [api, redis]
    command: ["sh", "-c", "pip install psycopg2-binary && exec celery -A src.worker.tasks worker --loglevel=info"]

  db:
    image: postgres:15-alpine
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-videodownloader}
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    mem_limit: 64m
    mem_reservation: 32m

volumes:
  pgdata:
  downloads: