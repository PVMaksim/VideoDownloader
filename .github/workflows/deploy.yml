name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ru_server
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/videograb

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🐳 Rebuilding containers..."
            docker compose -f backend/docker-compose.yml build --no-cache api worker

            echo "🚀 Restarting services..."
            docker compose -f backend/docker-compose.yml up -d --force-recreate api worker

            echo "⏳ Waiting for API..."
            sleep 5

            echo "🔍 Running migrations..."
            docker compose -f backend/docker-compose.yml exec -T api alembic upgrade head

            echo "❤️  Health check..."
            curl -f http://localhost:8000/api/health || exit 1

            echo "✅ Deploy complete!"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
            -d text="🔴 VideoGrab deploy FAILED%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"