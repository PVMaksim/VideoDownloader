name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "$SSH_KEY" > /tmp/key
          chmod 600 /tmp/key
          echo "🔍 Key type:"
          head -n 1 /tmp/key
          ssh-keygen -lf /tmp/key || echo "❌ Invalid key"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Git pull on server
        run: |
          ssh -i /tmp/key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 deploy@$VPS_HOST "
            set -e
            cd /home/deploy/VideoDownloader
            git fetch origin main
            git reset --hard origin/main
            echo '✅ Git updated'
          "
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Build containers
        run: |
          ssh -i /tmp/key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 deploy@$VPS_HOST "
            set -e
            cd /home/deploy/VideoDownloader/backend
            docker compose build --no-cache api worker
            echo '✅ Build complete'
          "
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Start services
        run: |
          ssh -i /tmp/key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 deploy@$VPS_HOST "
            set -e
            cd /home/deploy/VideoDownloader/backend
            docker compose up -d --force-recreate api worker
            echo '✅ Services started'
          "
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Health check
        run: |
          ssh -i /tmp/key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 deploy@$VPS_HOST "
            set -e
            echo 'Waiting 20s for startup...'
            sleep 20
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8301/api/health; then
                echo '✅ API is healthy!'
                exit 0
              fi
              echo \"Attempt \$i failed, waiting 5s...\"
              sleep 5
            done
            docker compose -f /home/deploy/VideoDownloader/backend/docker-compose.yml logs --tail=30 api
            exit 1
          "
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}