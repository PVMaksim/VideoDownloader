name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_B64 }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ru_server
          script: |
            set -e
            cd /home/deploy/videograb

            echo "📦 Pulling latest code..."
            git pull origin main

            if [ ! -f backend/.env ]; then
              echo "⚙️ Creating .env..."
              cat > backend/.env <<'ENVEOF'
POSTGRES_USER=videograb
POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
POSTGRES_DB=videograb
DATABASE_URL=postgresql+asyncpg://videograb:${{ secrets.DB_PASSWORD }}@db:5432/videograb
DATABASE_URL_SYNC=postgresql://videograb:${{ secrets.DB_PASSWORD }}@db:5432/videograb
SECRET_KEY=${{ secrets.SECRET_KEY }}
ENVEOF
            fi

            echo "🐳 Rebuilding containers..."
            docker compose -f backend/docker-compose.yml build --no-cache api worker

            echo "🚀 Restarting services..."
            docker compose -f backend/docker-compose.yml up -d --force-recreate api worker

            echo "⏳ Waiting for API..."
            sleep 5

            echo "🔍 Running migrations..."
            docker compose -f backend/docker-compose.yml exec -T api alembic upgrade head

            echo "❤️  Health check..."
            curl -f http://localhost:8000/api/health || exit 1

            echo "✅ Deploy complete!"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
            -d text="🔴 Deploy FAILED"