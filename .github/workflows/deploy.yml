name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/key
          chmod 600 /tmp/key

          # Отладка: показываем тип ключа
          echo "🔍 Key type:"
          head -n 1 /tmp/key
          echo "🔍 Key fingerprint:"
          ssh-keygen -lf /tmp/key || echo "❌ Invalid key"
          
          ssh -i /tmp/key -o StrictHostKeyChecking=no deploy@$VPS_HOST "
            set -e
            cd /home/deploy/VideoDownloader/backend
            
            git fetch origin main
            git reset --hard origin/main
            
            if [ ! -f .env ]; then
              echo 'POSTGRES_USER=user' > .env
              echo \"POSTGRES_PASSWORD='${DB_PASSWORD}'\" >> .env
              echo 'POSTGRES_DB=videodownloader' >> .env
              echo \"DATABASE_URL='postgresql+asyncpg://user:${DB_PASSWORD}@db:5432/videodownloader'\" >> .env
              echo \"DATABASE_URL_SYNC='postgresql://user:${DB_PASSWORD}@db:5432/videodownloader'\" >> .env
              echo \"SECRET_KEY='${SECRET_KEY}'\" >> .env
              echo 'SKIP_AUTH=false' >> .env
              echo 'SKIP_EMAIL_VERIFICATION=false' >> .env
              echo 'APP_URL=http://193.242.109.48:8301' >> .env
            fi
            
            echo 'Building containers...'
            docker compose build --no-cache api worker
            
            echo 'Starting services...'
            docker compose up -d --force-recreate api worker
            
            echo 'Waiting for API to start...'
            sleep 20
            
            echo 'Checking container status...'
            docker compose ps api
            
            echo 'Checking API logs...'
            docker compose logs --tail=50 api || true
            
            echo 'Health check with retries...'
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8301/api/health; then
                echo 'API is healthy!'
                exit 0
              fi
              echo \"Attempt \$i failed, waiting 5s...\"
              sleep 5
            done
            
            echo 'Health check failed after 5 attempts'
            docker compose logs api
            exit 1
          "
          
          rm -f /tmp/key