name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/key
          chmod 600 /tmp/key
          
          ssh -i /tmp/key -o StrictHostKeyChecking=no ru_server@$VPS_HOST "
            set -e
            cd /home/deploy/videograb
            
            git fetch origin main
            git reset --hard origin/main
            
            if [ ! -f backend/.env ]; then
              echo 'POSTGRES_USER=videograb' > backend/.env
              echo \"POSTGRES_PASSWORD='${DB_PASSWORD}'\" >> backend/.env
              echo 'POSTGRES_DB=videograb' >> backend/.env
              echo \"DATABASE_URL='postgresql+asyncpg://videograb:${DB_PASSWORD}@db:5432/videograb'\" >> backend/.env
              echo \"DATABASE_URL_SYNC='postgresql://videograb:${DB_PASSWORD}@db:5432/videograb'\" >> backend/.env
              echo \"SECRET_KEY='${SECRET_KEY}'\" >> backend/.env
            fi
            
            echo 'Building containers...'
            docker compose -f backend/docker-compose.yml build --no-cache api worker
            
            echo 'Starting services...'
            docker compose -f backend/docker-compose.yml up -d --force-recreate api worker
            
            echo 'Waiting for API to start...'
            sleep 20
            
            echo 'Checking container status...'
            docker compose -f backend/docker-compose.yml ps api
            
            echo 'Checking API logs...'
            docker compose -f backend/docker-compose.yml logs --tail=50 api || true
            
            echo 'Health check with retries...'
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8201/api/health; then
                echo 'API is healthy!'
                exit 0
              fi
              echo \"Attempt \$i failed, waiting 5s...\"
              sleep 5
            done
            
            echo 'Health check failed after 5 attempts'
            docker compose -f backend/docker-compose.yml logs api
            exit 1
          "
          
          rm -f /tmp/key
