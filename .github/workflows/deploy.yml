name: Test SSH
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/key
          chmod 600 /tmp/key
          ssh -i /tmp/key -o StrictHostKeyChecking=no ru_server@$VPS_HOST "echo OK"
