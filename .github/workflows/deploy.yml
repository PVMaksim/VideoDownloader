name: Deploy VideoGrab Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ru_server
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/deploy/videograb

            echo "Pulling latest code..."
            git pull origin main

            if [ ! -f backend/.env ]; then
              echo "Creating .env..."
              echo "POSTGRES_USER=videograb" > backend/.env
              echo "POSTGRES_PASSWORD=$$DB_PASSWORD" >> backend/.env
              echo "POSTGRES_DB=videograb" >> backend/.env
              echo "DATABASE_URL=postgresql+asyncpg://videograb:$$DB_PASSWORD@db:5432/videograb" >> backend/.env
              echo "DATABASE_URL_SYNC=postgresql://videograb:$$DB_PASSWORD@db:5432/videograb" >> backend/.env
              echo "SECRET_KEY=$$SECRET_KEY" >> backend/.env
            fi

            echo "Rebuilding containers..."
            docker compose -f backend/docker-compose.yml build --no-cache api worker

            echo "Restarting services..."
            docker compose -f backend/docker-compose.yml up -d --force-recreate api worker

            echo "Waiting for API..."
            sleep 5

            echo "Running migrations..."
            docker compose -f backend/docker-compose.yml exec -T api alembic upgrade head

            echo "Health check..."
            curl -f http://localhost:8000/api/health || exit 1

            echo "Deploy complete!"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
            -d text="Deploy FAILED"
